<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Профиль | IT Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="assets/img/IT-Guide_icon.jpg">
</head>
<body class="dark-theme">
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fas fa-code"></i> IT Guide</a>
            
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            
            <ul class="nav-menu" id="navMenu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="directions.html">Направления</a></li>
                <li><a href="languages.html">Языки</a></li>
                <li><a href="frameworks.html">Фреймворки</a></li>
                <li><a href="stats.html">Статистика</a></li>
                <li><a href="about.html">Обо мне</a></li>
                <li><a href="users.html">Пользователи</a></li>
            </ul>
            
            <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

            <div id="nav-auth" style="margin-left: 15px;"></div>
        </div>
    </nav>

    <main class="container profile-layout">
        
        <aside class="profile-sidebar">
            <div class="avatar-container">
                <img id="profile-avatar" src="images/default-avatar.png" alt="Avatar">
                <label for="avatar-input" class="avatar-edit-btn">
                    <i class="fas fa-camera"></i>
                </label>
                <input type="file" id="avatar-input" accept="image/*" style="display: none;">
            </div>
            
            <h2 id="profile-nickname" contenteditable="true">Loading...</h2>
            <p id="profile-bio" contenteditable="true">Loading bio...</p>
            
            <div class="stats-box">
                <div class="stat">
                    <span id="xp-count">0</span>
                    <label>XP</label>
                </div>
                <div class="stat">
                    <span id="lang-count">0</span>
                    <label>Языков</label>
                </div>
            </div>

            <button id="save-profile" class="btn btn-secondary">Сохранить изменения</button>
            <button id="btn-logout" class="btn btn-danger">Выйти</button>
        </aside>

        <section class="profile-content">
            <div class="tabs">
                <button class="tab-btn active" data-tab="progress">Прогресс</button>
                <button class="tab-btn" data-tab="bookmarks">Закладки</button>
                <button class="tab-btn" data-tab="settings">Настройки</button>
                <button class="tab-btn" data-tab="friends">Друзья</button>
            </div>

            <div id="tab-progress" class="tab-content active">
                <h3>Изученные языки</h3>
                <div id="languages-list" class="grid-list">
                    </div>
                
                <h3 style="margin-top: 20px;">Достижения</h3>
                <div id="achievements-list" class="badges-container">
                    </div>
            </div>

            <div id="tab-bookmarks" class="tab-content">
                <h3>🔖 Мои закладки</h3>
                
                <div class="add-bookmark-form" style="margin-bottom: 20px; background: var(--bg-secondary); padding: 15px; border-radius: 8px;">
                    <input type="text" id="bookmark-title" placeholder="Название (например: Курс по Python)" style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary);">
                    <input type="url" id="bookmark-url" placeholder="Ссылка (https://...)" style="width: 100%; margin-bottom: 10px; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-primary);">
                    <button id="btn-add-bookmark" class="btn btn-primary" style="width: 100%;">Добавить закладку</button>
                </div>

                <ul id="bookmarks-list" style="list-style: none; padding: 0;"></ul>
            </div>
            
            <div id="tab-friends" class="tab-content">
                
                <div id="requests-container" style="display:none; margin-bottom: 20px; padding: 15px; background: rgba(34, 197, 94, 0.1); border-radius: 10px;">
                    <h4 style="margin-bottom: 10px; color: var(--accent-green);">📩 Входящие заявки</h4>
                    <div id="requests-list"></div>
                </div>

                <h3>Мои друзья</h3>
                <div id="friends-list" class="grid-list">
                    </div>
            </div>

            <div id="tab-settings" class="tab-content">
                <h3>⚙️ Управление аккаунтом</h3>
                
                <div style="margin-top: 20px;">
                    <p style="margin-bottom: 10px; color: var(--text-secondary);">Если вы хотите начать обучение заново:</p>
                    <button id="btn-reset-progress" class="btn btn-danger" style="background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444;">
                        <i class="fas fa-trash-alt"></i> Сбросить весь прогресс
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="js/common.js"></script>
    <script type="module" src="js/profile.js"></script>
    <script type="module" src="js/auth.js"></script>
</body>
</html>
