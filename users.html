<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пользователи | IT Guide</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .user-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            position: relative;
        }
        .user-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-blue);
        }
        .user-card img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 2px solid var(--accent-blue);
        }
        .search-box {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }
        .friend-status {
            font-size: 0.8rem;
            margin-top: 10px;
            color: var(--accent-green);
        }
        .top-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 0.8rem;
        }
    </style>
    <link rel="icon" type="image/png" href="assets/img/IT-Guide_icon.jpg">
</head>
<body class="dark-theme">
    <nav class="navbar">
    <div class="container">
        <a href="index.html" class="logo"><i class="fas fa-code"></i> IT Guide</a>
        
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        
        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html">Главная</a></li>
            <li><a href="directions.html">Направления</a></li>
            <li><a href="languages.html">Языки</a></li>
            <li><a href="frameworks.html">Фреймворки</a></li>
            <li><a href="stats.html">Статистика</a></li>
            <li><a href="about.html">Обо мне</a></li>
            <li><a href="users.html">Пользователи</a></li>
        </ul>
        
        <button class="theme-toggle" id="themeToggle"><i class="fas fa-moon"></i></button>

        <div id="nav-auth" style="margin-left: 15px;"></div>
    </div>
</nav>

    <main class="container" style="padding-top: 40px; padding-bottom: 60px;">
        <h1 style="text-align: center; margin-bottom: 10px;">Сообщество IT Guide</h1>
        <p style="text-align: center; color: var(--text-secondary); margin-bottom: 40px;">Ищите друзей, сравнивайте XP и учитесь вместе</p>

        <input type="text" id="user-search" class="search-box" placeholder="🔍 Поиск пользователя по нику...">

        <div id="users-list" class="users-grid">
            <p style="text-align:center; width: 100%;">Загрузка пользователей...</p>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script type="module" src="js/users.js"></script> <script type="module" src="js/auth.js"></script>
</body>
</html>
